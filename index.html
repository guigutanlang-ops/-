
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>玄鉴仙族：昊天纪元</title>
    <link href="https://fonts.googleapis.com/css2?family=Ma+Shan+Zheng&family=Noto+Sans+SC:wght@400;500;700&family=Noto+Serif+SC:wght@600;900&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            text-rendering: optimizeLegibility;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
        }
        html, body {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }
        #root {
            width: 100vw;
            height: 100vh;
            position: relative;
            background: #0a0f0d;
        }

        .game-canvas {
            width: 1920px;
            height: 1080px;
            background-color: #0E1512;
            overflow: hidden;
            box-shadow: 0 0 100px rgba(0,0,0,1);
        }

        .world-map-main {
            background-color: #f4e4bc;
            background-image: 
                radial-gradient(circle at 50% 50%, rgba(201, 160, 99, 0.05) 0%, transparent 80%),
                url('https://www.transparenttextures.com/patterns/parchment.png');
            position: relative;
            perspective: 1000px;
        }

        .spirit-vein-path {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: vein-flow 30s linear infinite;
            filter: blur(1.5px) opacity(0.25);
        }

        @keyframes vein-flow {
            to { stroke-dashoffset: 0; }
        }

        .mist-layer {
            position: absolute;
            inset: -100%;
            width: 300%;
            height: 300%;
            background-image: url('https://www.transparenttextures.com/patterns/asfalt-dark.png');
            opacity: 0.08;
            mix-blend-mode: screen;
            pointer-events: none;
            animation: mist-drift 120s linear infinite;
        }

        @keyframes mist-drift {
            from { transform: translate(0, 0); }
            to { transform: translate(-10%, -5%); }
        }

        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0, 0, 0, 0.3); }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #3a4a44; border-radius: 3px; }
        
        @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
        .animate-fade-in { animation: fade-in 0.8s ease-out forwards; }

        .territory-dashed-border {
            stroke-dasharray: 10, 10;
            animation: border-dash-flow 15s linear infinite;
        }

        @keyframes border-dash-flow {
            from { stroke-dashoffset: 200; }
            to { stroke-dashoffset: 0; }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <svg style="position: absolute; width: 0; height: 0;" aria-hidden="true">
        <defs>
            <filter id="territory-paper-ink">
                <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise" />
                <feDisplacementMap in="SourceGraphic" in2="noise" scale="5" xChannelSelector="R" yChannelSelector="G" />
                <feGaussianBlur stdDeviation="3" />
            </filter>
        </defs>
    </svg>

    <script type="module" src="/index.tsx"></script>
</body>
</html>
